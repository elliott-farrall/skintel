app = "skintel"
primary_region = "lhr"

[build]

[env]
  PORT = "8080"
  SKINTEL_DB = "/data/skintel.db"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1

[[mounts]]
  source = "skintel_data"
  destination = "/data"

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
