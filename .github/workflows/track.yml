name: Fetch & Ingest Prices

on:
  schedule:
    - cron: '0 */6 * * *'  # every 6 hours
  workflow_dispatch:

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - run: pip install requests

      - run: python tracker.py collect
          --steam-id "$STEAM_ID"
          --api-key "$STEAMWEBAPI_KEY"
          --push-url "$FLY_INGEST_URL"
          --push-token "$INGEST_TOKEN"
        env:
          STEAM_ID:        ${{ secrets.STEAM_ID }}
          STEAMWEBAPI_KEY: ${{ secrets.STEAMWEBAPI_KEY }}
          FLY_INGEST_URL:  ${{ secrets.FLY_INGEST_URL }}
          INGEST_TOKEN:    ${{ secrets.INGEST_TOKEN }}
